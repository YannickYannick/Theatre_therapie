# Railway — définir le dossier racine du service sur « backend » dans le dashboard,
# ou placer ce fichier à la racine du dépôt et pointer le service vers ce répertoire.

[build]
builder = "NIXPACKS"
# collectstatic sans BDD prod : settings local suffisent pendant l’image Nixpacks
buildCommand = "DJANGO_SETTINGS_MODULE=config.settings.local python manage.py collectstatic --noinput"

[deploy]
# migrate en release : le conteneur web démarre tout de suite sur Gunicorn (healthcheck plus fiable).
releaseCommand = "export DJANGO_SETTINGS_MODULE=config.settings.production && export PATH=\"/opt/venv/bin:$PATH\" && /opt/venv/bin/python manage.py migrate --noinput"
startCommand = "export DJANGO_SETTINGS_MODULE=config.settings.production && export PATH=\"/opt/venv/bin:$PATH\" && exec /opt/venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4 --timeout 120 --access-logfile - --error-logfile -"
healthcheckPath = "/api/health/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
